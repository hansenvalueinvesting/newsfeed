<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>newsfeed.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #161616;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #c8c8c8;
    --text-dim: #555;
    --text-dimmer: #333;
    --accent: #e8e8e8;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --source-bbg: #f97316;
    --source-wsj: #3b82f6;
    --source-nyt: #e5e7eb;
    --source-scmp: #facc15;
    --topic-markets:   #34d399;
    --topic-economics: #60a5fa;
    --topic-politics:  #f472b6;
    --topic-tech:      #a78bfa;
    --topic-world:     #fbbf24;
    --topic-us:        #fb923c;
    --topic-business:  #38bdf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.4;
    min-height: 100vh;
  }

  /* HEADER */
  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  #wordmark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  #status {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dimmer);
    transition: background 0.3s;
  }
  #status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  #status-dot.live    { background: var(--green); animation: livepulse 3s ease-in-out infinite; }
  #status-dot.error   { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes livepulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  #count { margin-left: auto; font-size: 10px; color: var(--text-dim); }

  #refresh-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 2px 6px;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  #refresh-btn:hover { color: var(--accent); }

  #last-updated { font-size: 10px; color: var(--text-dim); }
  #lifetime-count { font-size: 10px; color: var(--text-dim); }

  /* PROGRESS BAR */
  #progress { height: 1px; background: var(--border); overflow: hidden; }
  #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

  /* LAYOUT */
  #body-layout { display: flex; align-items: flex-start; }

  /* FEED */
  #feed-wrap { flex: 1; min-width: 0; }

  #feed-table { width: 100%; border-collapse: collapse; }

  #feed-table thead {
    position: sticky;
    top: 37px;
    z-index: 98;
    background: var(--bg2);
  }

  #feed-table thead th {
    padding: 5px 16px;
    text-align: left;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    border-bottom: 1px solid var(--border);
  }

  th.col-time   { width: 80px; }
  th.col-source { width: 120px; }
  th.col-tag    { width: 80px; }

  .feed-row { border-bottom: 1px solid #141414; transition: background 0.1s; }
  .feed-row:hover { background: var(--bg3); }
  .feed-row td { padding: 6px 16px; vertical-align: middle; }

  .cell-time { color: var(--text-dimmer); font-size: 10px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .age-fresh  { color: var(--green); }
  .age-recent { color: var(--amber); }
  .age-old    { color: var(--text-dimmer); }

  .cell-source { white-space: nowrap; }

  .source-badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .src-BBG { color: var(--source-bbg); border: 1px solid #3a1f0a; background: #1a0f05; }
  .src-WSJ { color: var(--source-wsj); border: 1px solid #0e2040; background: #060e1a; }
  .src-NYT  { color: var(--source-nyt);  border: 1px solid #2a2a2a; background: #141414; }
  .src-SCMP { color: var(--source-scmp); border: 1px solid #3a3000; background: #1a1500; }

  .cell-tag { white-space: nowrap; }

  .topic-badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .topic-Markets   { color: var(--topic-markets);   border: 1px solid #0d3326; background: #061a12; }
  .topic-Economics { color: var(--topic-economics); border: 1px solid #0e2040; background: #060e1a; }
  .topic-Politics  { color: var(--topic-politics);  border: 1px solid #3d1127; background: #1e0813; }
  .topic-Tech      { color: var(--topic-tech);      border: 1px solid #2d1f4a; background: #160e24; }
  .topic-World     { color: var(--topic-world);     border: 1px solid #3d2f0a; background: #1e1705; }
  .topic-US        { color: var(--topic-us);        border: 1px solid #3d1f0a; background: #1e0f05; }
  .topic-Business  { color: var(--topic-business);  border: 1px solid #0d2e3d; background: #06151e; }

  .headline-link {
    color: var(--text);
    text-decoration: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.3;
    transition: color 0.1s;
  }
  .headline-link:hover { color: var(--accent); }

  /* TOOLTIP */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 999;
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 10px 14px;
    max-width: 420px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #aaa;
    line-height: 1.5;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  /* EMPTY / LOADING */
  #loading-row td, #empty-row td {
    padding: 40px 16px;
    color: var(--text-dimmer);
    font-size: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* SIDEBAR */
  #sidebar {
    width: 160px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding: 14px 12px;
    position: sticky;
    top: 37px;
    height: calc(100vh - 37px);
    overflow-y: auto;
    background: var(--bg);
  }

  .sidebar-section { margin-bottom: 18px; }

  .sidebar-label {
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 7px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }

  /* FILTER BTN — green dot indicator */
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-dimmer);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 4px 6px;
    cursor: pointer;
    text-align: left;
    text-transform: uppercase;
    transition: color 0.12s;
  }
  .filter-btn::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-dimmer);
    transition: background 0.12s;
  }
  .filter-btn:hover { color: var(--text-dim); }
  .filter-btn:hover::before { background: var(--text-dim); }
  .filter-btn.active { color: var(--text); }
  .filter-btn.active::before { background: var(--green); animation: livepulse 3s ease-in-out infinite; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBma3Xd482KuQcdadaOtQVsp4na0wqgiZY",
  authDomain: "newsfeed-582bf.firebaseapp.com",
  databaseURL: "https://newsfeed-582bf-default-rtdb.firebaseio.com",
  projectId: "newsfeed-582bf",
  storageBucket: "newsfeed-582bf.firebasestorage.app",
  messagingSenderId: "469870749559",
  appId: "1:469870749559:web:1749386c8caf923595a372"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const countRef = ref(db, 'newsfeed/lifetimeCount');

// Live-sync the displayed counter
onValue(countRef, snap => {
  const val = snap.val() || 0;
  const el = document.getElementById('lifetime-count');
  if (el) el.textContent = `${val.toLocaleString()} universal lifetime total articles pulled.`;
});

// Expose increment function for loadAll to call
window.logPull = function(count) {
  runTransaction(countRef, current => (current || 0) + count);
};
</script>
</head>
<body>

<div id="header">
  <span id="wordmark">📡 newsfeed.</span>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">IDLE</span>
  </div>
  <span id="last-updated"></span>
  <span id="lifetime-count"></span>
  <span id="count"></span>
  <button id="refresh-btn" onclick="loadAll()">↺ REFRESH</button>
</div>

<div id="progress"><div id="progress-bar"></div></div>

<div id="body-layout">
  <div id="feed-wrap">
    <table id="feed-table">
      <thead>
        <tr>
          <th class="col-time">TIME</th>
          <th class="col-source">SOURCE</th>
          <th class="col-tag">TOPIC</th>
          <th class="col-headline">HEADLINE</th>
        </tr>
      </thead>
      <tbody id="feed-body">
        <tr id="loading-row"><td colspan="4">INITIALIZING...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Source</div>
      <button class="filter-btn active" data-src="BBG" onclick="toggleFilter(this,'src')">Bloomberg</button>
      <button class="filter-btn active" data-src="WSJ" onclick="toggleFilter(this,'src')">WSJ</button>
      <button class="filter-btn active" data-src="NYT"  onclick="toggleFilter(this,'src')">NYT</button>
      <button class="filter-btn active" data-src="SCMP" onclick="toggleFilter(this,'src')">SCMP</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Topic</div>
      <button class="filter-btn active" data-topic="Markets"   onclick="toggleFilter(this,'topic')">Markets</button>
      <button class="filter-btn active" data-topic="Economics" onclick="toggleFilter(this,'topic')">Economics</button>
      <button class="filter-btn active" data-topic="Politics"  onclick="toggleFilter(this,'topic')">Politics</button>
      <button class="filter-btn active" data-topic="Tech"      onclick="toggleFilter(this,'topic')">Tech</button>
      <button class="filter-btn active" data-topic="World"     onclick="toggleFilter(this,'topic')">World</button>
      <button class="filter-btn active" data-topic="US"        onclick="toggleFilter(this,'topic')">US</button>
      <button class="filter-btn active" data-topic="Business"  onclick="toggleFilter(this,'topic')">Business</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

const FEEDS = [
  { url: 'https://feeds.bloomberg.com/economics/news.rss',                    src: 'BBG', topic: 'Economics' },
  { url: 'https://feeds.bloomberg.com/markets/news.rss',                      src: 'BBG', topic: 'Markets'   },
  { url: 'https://feeds.bloomberg.com/politics/news.rss',                     src: 'BBG', topic: 'Politics'  },
  { url: 'https://feeds.bloomberg.com/technology/news.rss',                   src: 'BBG', topic: 'Tech'      },
  { url: 'https://feeds.content.dowjones.io/public/rss/socialeconomyfeed',    src: 'WSJ', topic: 'Economics' },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSMarketsMain',       src: 'WSJ', topic: 'Markets'   },
  { url: 'https://feeds.content.dowjones.io/public/rss/socialpoliticsfeed',   src: 'WSJ', topic: 'Politics'  },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSWorldNews',         src: 'WSJ', topic: 'World'     },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSUSnews',            src: 'WSJ', topic: 'US'        },
  { url: 'https://feeds.content.dowjones.io/public/rss/WSJcomUSBusiness',     src: 'WSJ', topic: 'Business'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',            src: 'NYT', topic: 'World'     },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/US.xml',               src: 'NYT', topic: 'US'        },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml',         src: 'NYT', topic: 'Politics'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml',         src: 'NYT', topic: 'Business'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Economy.xml',          src: 'NYT', topic: 'Economics' },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Dealbook.xml',         src: 'NYT', topic: 'Markets'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml',       src: 'NYT',  topic: 'Tech'      },
  { url: 'https://www.scmp.com/rss/91/feed/',                                   src: 'SCMP', topic: 'World'     },
  { url: 'https://www.scmp.com/rss/318198/feed/',                               src: 'SCMP', topic: 'Politics'  },
  { url: 'https://www.scmp.com/rss/318421/feed/',                               src: 'SCMP', topic: 'Economics' },
  { url: 'https://www.scmp.com/rss/92/feed/',                                    src: 'SCMP', topic: 'Business'  },
  { url: 'https://www.scmp.com/rss/36/feed/',                                    src: 'SCMP', topic: 'Tech'      },
];

let allItems = [];
let activeSources = new Set(['BBG','WSJ','NYT','SCMP']);
let activeTopics  = new Set(['Markets','Economics','Politics','Tech','World','US','Business']);

// ── FETCH ──────────────────────────────────────────────────────────────────

async function fetchFeed(feed, proxyIdx = 0) {
  if (proxyIdx >= CORS_PROXIES.length) return [];
  const proxyUrl = CORS_PROXIES[proxyIdx](feed.url);
  try {
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    return parseRSS(text, feed);
  } catch {
    return fetchFeed(feed, proxyIdx + 1);
  }
}

function parseRSS(xml, feed) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item'));
  return items.map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
    const desc    = item.querySelector('description')?.textContent?.trim() || '';
    const date    = pubDate ? new Date(pubDate) : new Date(0);

    const div = document.createElement('div');
    div.innerHTML = desc;
    const cleanDesc = div.textContent.trim().slice(0, 280);

    return { title, link, date, desc: cleanDesc, src: feed.src, topic: feed.topic };
  }).filter(i => i.title && i.date.getFullYear() > 2000);
}

// ── LOAD ALL ───────────────────────────────────────────────────────────────

async function loadAll() {
  setStatus('loading', 'FETCHING');
  setProgress(0);

  const results = [];
  let done = 0;

  const promises = FEEDS.map(async feed => {
    const items = await fetchFeed(feed);
    results.push(...items);
    done++;
    setProgress(Math.round((done / FEEDS.length) * 100));
  });

  await Promise.allSettled(promises);

  const seen = new Set();
  allItems = results.filter(i => {
    const key = i.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  allItems.sort((a, b) => b.date - a.date);

  setStatus('live', `LIVE · ${allItems.length} items`);
  setProgress(100);
  setTimeout(() => setProgress(0), 600);

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `updated ${now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false})}`;

  if (window.logPull) window.logPull(results.length);
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────

function render() {
  const body = document.getElementById('feed-body');
  const filtered = allItems.filter(i => activeSources.has(i.src) && activeTopics.has(i.topic));

  document.getElementById('count').textContent = `${filtered.length} stories`;

  if (filtered.length === 0) {
    body.innerHTML = `<tr id="empty-row"><td colspan="4">NO RESULTS</td></tr>`;
    return;
  }

  body.innerHTML = filtered.map(item => {
    const { ageClass } = formatAge(item.date);
    const timeStr = item.date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const escapedDesc  = escHtml(item.desc || '—');
    const escapedTitle = escHtml(item.title);

    return `<tr class="feed-row">
      <td class="cell-time"><span class="${ageClass}">${timeStr}</span></td>
      <td class="cell-source"><span class="source-badge src-${item.src}">${item.src}</span></td>
      <td class="cell-tag"><span class="topic-badge topic-${item.topic}">${item.topic}</span></td>
      <td class="cell-headline">
        <a class="headline-link" href="${item.link}" target="_blank" rel="noopener"
           data-desc="${escapedDesc}"
           onmouseenter="showTip(event,this)"
           onmousemove="moveTip(event)"
           onmouseleave="hideTip()"
        >${escapedTitle}</a>
      </td>
    </tr>`;
  }).join('');
}

// ── TOOLTIP ────────────────────────────────────────────────────────────────

const tip = document.getElementById('tooltip');

function showTip(e, el) {
  const desc = el.getAttribute('data-desc');
  if (!desc || desc === '—') return;
  tip.textContent = desc;
  tip.style.display = 'block';
  moveTip(e);
}

function moveTip(e) {
  const pad = 14, tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}

function hideTip() { tip.style.display = 'none'; }

// ── FILTERS ────────────────────────────────────────────────────────────────

function toggleFilter(btn, type) {
  if (type === 'src') {
    const val = btn.dataset.src;
    if (activeSources.has(val)) {
      if (activeSources.size === 1) return;
      activeSources.delete(val);
      btn.classList.remove('active');
    } else {
      activeSources.add(val);
      btn.classList.add('active');
    }
  } else {
    const val = btn.dataset.topic;
    if (activeTopics.has(val)) {
      if (activeTopics.size === 1) return;
      activeTopics.delete(val);
      btn.classList.remove('active');
    } else {
      activeTopics.add(val);
      btn.classList.add('active');
    }
  }
  render();
}

// ── HELPERS ────────────────────────────────────────────────────────────────

function setStatus(state, text) {
  document.getElementById('status-dot').className = state;
  document.getElementById('status-text').textContent = text;
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

function formatAge(date) {
  const mins = Math.floor((Date.now() - date) / 60000);
  if (mins < 30)  return { ageClass: 'age-fresh'  };
  if (mins < 180) return { ageClass: 'age-recent' };
  return { ageClass: 'age-old' };
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── INIT ───────────────────────────────────────────────────────────────────

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
