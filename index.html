<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const analyticsApp = initializeApp(
    { databaseURL: "https://github-analytics-9bd0b-default-rtdb.firebaseio.com" },
    "analytics"
  );
  const db = getDatabase(analyticsApp);

  runTransaction(ref(db, "visits/newsfeed"), n => (n || 0) + 1);
  runTransaction(ref(db, "visits/total"),    n => (n || 0) + 1);

  window._analyticsDb = db;
  window._analyticsRef = ref;
  window._analyticsTransaction = runTransaction;
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>newsfeed.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #161616;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #c8c8c8;
    --text-dim: #555;
    --text-dimmer: #333;
    --accent: #e8e8e8;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --source-bbg:  #f97316;
    --source-wsj:  #3b82f6;
    --source-nyt:  #e5e7eb;
    --source-scmp: #facc15;
    --topic-markets:  #34d399;
    --topic-economy:  #60a5fa;
    --topic-politics: #f472b6;
    --topic-tech:     #a78bfa;
    --topic-world:    #fbbf24;
    --topic-us:       #fb923c;
    --topic-business: #38bdf8;
    --topic-china:    #f87171;
    --header-h: 40px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.4;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: var(--header-h);
  }

  #wordmark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #status {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  #status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dimmer);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  #status-dot.live    { background: var(--green); animation: livepulse 3s ease-in-out infinite; }
  #status-dot.error   { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  #header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
    justify-content: flex-end;
  }

  #count, #last-updated, #lifetime-count {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  #sparkline-wrap {
    display: flex;
    align-items: flex-end;
    flex: 1;
    min-width: 0;
    max-width: 300px;
  }
  #sparkline {
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 18px;
    width: 100%;
    overflow: hidden;
  }
  .spark-bar {
    border-radius: 1px 1px 0 0;
    min-height: 1px;
    flex-shrink: 0;
  }

  #refresh-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 6px 8px;
    letter-spacing: 0.1em;
    transition: color 0.15s;
    white-space: nowrap;
    min-height: 36px;
    display: flex;
    align-items: center;
  }
  #refresh-btn:hover { color: var(--accent); }

  /* ── PROGRESS ───────────────────────────────────────── */
  #progress { height: 1px; background: var(--border); overflow: hidden; }
  #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

  /* ── LAYOUT ─────────────────────────────────────────── */
  #body-layout { display: flex; align-items: flex-start; }
  #feed-wrap { flex: 1; min-width: 0; }

  /* ── FEED TABLE (desktop) ───────────────────────────── */
  #feed-table { width: 100%; border-collapse: collapse; }

  #feed-table thead {
    position: sticky;
    top: var(--header-h);
    z-index: 98;
    background: var(--bg2);
  }
  #feed-table thead th {
    padding: 5px 16px;
    text-align: left;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    border-bottom: 1px solid var(--border);
  }
  th.col-time   { width: 80px; }
  th.col-source { width: 120px; }
  th.col-tag    { width: 100px; }

  .feed-row { border-bottom: 1px solid #141414; transition: background 0.1s; }
  .feed-row:hover { background: var(--bg3); }
  .feed-row td { padding: 6px 16px; vertical-align: middle; }

  .cell-time { color: var(--text-dimmer); font-size: 10px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .age-fresh  { color: var(--green); }
  .age-recent { color: var(--amber); }
  .age-old    { color: var(--text-dimmer); }

  .cell-source { white-space: nowrap; }

  .source-badge {
    font-size: 9px; font-weight: 500;
    letter-spacing: 0.08em; padding: 1px 5px;
    border-radius: 2px; text-transform: uppercase;
  }
  .src-BBG  { color: var(--source-bbg);  border: 1px solid #3a1f0a; background: #1a0f05; }
  .src-WSJ  { color: var(--source-wsj);  border: 1px solid #0e2040; background: #060e1a; }
  .src-NYT  { color: var(--source-nyt);  border: 1px solid #2a2a2a; background: #141414; }
  .src-SCMP { color: var(--source-scmp); border: 1px solid #3a3000; background: #1a1500; }

  .cell-tag { white-space: nowrap; }

  .topic-badge {
    font-size: 9px; font-weight: 500;
    letter-spacing: 0.08em; padding: 1px 5px;
    border-radius: 2px; text-transform: uppercase;
  }
  .topic-Economy  { color: var(--topic-economy);  border: 1px solid #0e2040; background: #060e1a; }
  .topic-Markets  { color: var(--topic-markets);  border: 1px solid #0d3326; background: #061a12; }
  .topic-Politics { color: var(--topic-politics); border: 1px solid #3d1127; background: #1e0813; }
  .topic-Tech     { color: var(--topic-tech);     border: 1px solid #2d1f4a; background: #160e24; }
  .topic-Business { color: var(--topic-business); border: 1px solid #0d2e3d; background: #06151e; }
  .topic-World    { color: var(--topic-world);    border: 1px solid #3d2f0a; background: #1e1705; }
  .topic-China    { color: var(--topic-china);    border: 1px solid #3d1010; background: #1e0808; }
  .topic-US       { color: var(--topic-us);       border: 1px solid #3d1f0a; background: #1e0f05; }

  .headline-link {
    color: var(--text);
    text-decoration: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px; font-weight: 300;
    line-height: 1.3;
    transition: color 0.1s;
  }
  .headline-link:hover { color: var(--accent); }

  /* ── TOOLTIP (desktop only) ─────────────────────────── */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 999;
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 10px 14px;
    max-width: 420px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px; font-weight: 300;

    line-height: 1.5;

  /* ── EMPTY / LOADING ────────────────────────────────── */
  #loading-row td, #empty-row td {
    padding: 40px 16px;
    color: var(--text-dimmer);
    font-size: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* ── SIDEBAR (desktop) ──────────────────────────────── */
  #sidebar {
    width: 160px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding: 14px 12px;
    position: sticky;
    top: var(--header-h);
    height: calc(100vh - var(--header-h));

    background: var(--bg);

  .sidebar-section { margin-bottom: 18px; }

  .sidebar-label {
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 7px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-dimmer);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 4px 6px;
    cursor: pointer;
    text-align: left;
    text-transform: uppercase;
    transition: color 0.12s;
  }
  .filter-btn::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-dimmer);
    transition: background 0.12s;
  }
  .filter-btn:hover { color: var(--text-dim); }
  .filter-btn:hover::before { background: var(--text-dim); }
  .filter-btn.active { color: var(--text); }
  .filter-btn.active::before { background: var(--green); animation: livepulse 3s ease-in-out infinite; }

  /* ── KEYWORD SEARCH ─────────────────────────────────── */
  #keyword-search-wrap { margin-bottom: 18px; }
  #keyword-input {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  #keyword-input::placeholder { color: var(--text-dimmer); }
  #keyword-input:focus { border-color: #444; }
  #keyword-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

  .keyword-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #161616;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .keyword-tag-remove {
    background: none; border: none;
    color: var(--text-dimmer);
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.1s;
  }
  .keyword-tag-remove:hover { color: var(--red); }

  /* ── MOBILE FILTER FAB ──────────────────────────────── */
  #filter-fab {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 16px;
    z-index: 200;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: background 0.15s, border-color 0.15s;
    padding-bottom: var(--safe-bottom);
  }
  #filter-fab:active { background: #252525; border-color: #444; }
  #filter-fab .fab-count {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--green);
    color: #000;
    font-size: 8px;
    font-weight: 500;
    min-width: 16px; height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── MOBILE DRAWER ──────────────────────────────────── */
  #drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    transition: opacity 0.25s;
  }
  #drawer-overlay.open { opacity: 1; }

  #drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 301;
    background: var(--bg2);
    border-top: 1px solid var(--border2);
    border-radius: 12px 12px 0 0;
    max-height: 70vh;
    max-height: 70dvh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: var(--safe-bottom);
    display: none;
  }
  #drawer.open { transform: translateY(0); }

  #drawer-handle {
    display: flex;
    justify-content: center;
    padding: 10px 0 6px;
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }
  #drawer-handle::after {
    content: '';
    width: 36px; height: 4px;
    border-radius: 2px;
    background: #333;
  }

  #drawer-content { padding: 8px 16px 24px; }

  .drawer-section-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 10px;
    margin-top: 16px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-section-label:first-child { margin-top: 0; }

  .drawer-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .drawer-chip {
    background: #0f0f0f;
    border: 1px solid var(--border2);
    color: var(--text-dimmer);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .drawer-chip.active {
    color: var(--accent);
    border-color: #444;
    background: #1a1a1a;
  }
  .drawer-chip.active::before {
    content: '● ';
    color: var(--green);
    font-size: 8px;
  }

  #drawer-keyword-input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.15s;
    margin-top: 10px;
  }
  #drawer-keyword-input::placeholder { color: var(--text-dimmer); }
  #drawer-keyword-input:focus { border-color: #444; }

  #drawer-keyword-tags {
    display: flex; flex-wrap: wrap;
    gap: 6px; margin-top: 8px;
  }
  .drawer-keyword-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #161616;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .drawer-keyword-tag button {
    background: none; border: none;
    color: var(--text-dimmer);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  /* ── MOBILE CARD LAYOUT ─────────────────────────────── */
  #card-feed {
    display: none;
    padding: 0;
  }

  .feed-card {
    display: block;
    padding: 14px 16px;
    border-bottom: 1px solid #141414;
    text-decoration: none;
    color: inherit;
    transition: background 0.1s;
  }
  .feed-card:active { background: var(--bg3); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .card-meta .source-badge,
  .card-meta .topic-badge {
    font-size: 9px;
  }
  .card-time {
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    margin-left: auto;
  }
  .card-headline {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
  }
  .card-desc {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    line-height: 1.45;
    color: var(--text-dim);
    margin-top: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #card-empty, #card-loading {
    padding: 60px 16px;
    color: var(--text-dimmer);
    font-size: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* ── SCROLLBAR ──────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ══════════════════════════════════════════════════════
     RESPONSIVE — MOBILE BREAKPOINT
     ══════════════════════════════════════════════════════ */
  @media (max-width: 680px) {
    :root { --header-h: auto; }

    #header {
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 8px 12px;
    }

    /* hide desktop-only items on mobile */
    #sparkline-wrap,
    #last-updated,
    #lifetime-count { display: none; }

    #header-meta { gap: 8px; }

    /* hide desktop table and sidebar */
    #feed-table, #sidebar { display: none; }

    /* show mobile card feed */
    #card-feed { display: block; }

    /* show filter FAB */
    #filter-fab { display: flex; }

    .card-headline { font-size: 13px; }
  }

  /* tablet tweaks */
  @media (min-width: 681px) and (max-width: 900px) {
    #sidebar { width: 140px; }
    th.col-source { width: 90px; }
    th.col-tag { width: 80px; }
    .headline-link { font-size: 11px; }
  }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBma3Xd482KuQcdadaOtQVsp4na0wqgiZY",
  authDomain: "newsfeed-582bf.firebaseapp.com",
  databaseURL: "https://newsfeed-582bf-default-rtdb.firebaseio.com",
  projectId: "newsfeed-582bf",
  storageBucket: "newsfeed-582bf.firebasestorage.app",
  messagingSenderId: "469870749559",
  appId: "1:469870749559:web:1749386c8caf923595a372"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const countRef = ref(db, 'newsfeed/lifetimeCount');

onValue(countRef, snap => {
  const val = snap.val() || 0;
  const el = document.getElementById('lifetime-count');
  if (el) el.textContent = `${val.toLocaleString()} lifetime pulls`;
});

window.logPull = function(count) {
  runTransaction(countRef, current => (current || 0) + count);
};
</script>

  <span id="wordmark">📡 newsfeed.</span>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">IDLE</span>
  </div>
  <div id="header-meta">
    <span id="last-updated"></span>
    <span id="lifetime-count"></span>
    <div id="sparkline-wrap">

<div id="progress"><div id="progress-bar"></div></div>

        <tr>
          <th class="col-time">TIME</th>

      <div class="sidebar-label">Source</div>
      <button class="filter-btn active" data-src="BBG"  onclick="toggleFilter(this,'src')">Bloomberg</button>
      <button class="filter-btn active" data-src="WSJ"  onclick="toggleFilter(this,'src')">WSJ</button>
      <button class="filter-btn active" data-src="NYT"  onclick="toggleFilter(this,'src')">NYT</button>
      <button class="filter-btn active" data-src="SCMP" onclick="toggleFilter(this,'src')">SCMP</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Topic</div>
      <button class="filter-btn active" data-topic="Economy"  onclick="toggleFilter(this,'topic')">Economy</button>
      <button class="filter-btn active" data-topic="Markets"  onclick="toggleFilter(this,'topic')">Markets</button>
      <button class="filter-btn active" data-topic="Politics" onclick="toggleFilter(this,'topic')">Politics</button>
      <button class="filter-btn active" data-topic="Tech"     onclick="toggleFilter(this,'topic')">Tech</button>
      <button class="filter-btn active" data-topic="Business" onclick="toggleFilter(this,'topic')">Business</button>
      <button class="filter-btn active" data-topic="World"    onclick="toggleFilter(this,'topic')">World</button>
      <button class="filter-btn active" data-topic="China"    onclick="toggleFilter(this,'topic')">China</button>
      <button class="filter-btn active" data-topic="US"       onclick="toggleFilter(this,'topic')">US</button>
    </div>
  </div>
</div>

<!-- Mobile filter FAB -->
<button id="filter-fab" onclick="openDrawer()">
  ⚙
  <span class="fab-count" id="fab-count" style="display:none"></span>
</button>

<!-- Mobile filter drawer -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-handle"></div>
  <div id="drawer-content">
    <div class="drawer-section-label">Keywords</div>
    <input id="drawer-keyword-input" type="text" placeholder="type + enter to add keyword..." spellcheck="false" />
    <div id="drawer-keyword-tags"></div>

    <div class="drawer-section-label">Source</div>
    <div class="drawer-chips" id="drawer-src-chips"></div>

    <div class="drawer-section-label">Topic</div>
    <div class="drawer-chips" id="drawer-topic-chips"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

const FEEDS = [
  { url: 'https://feeds.bloomberg.com/economics/news.rss',                  src: 'BBG',  topic: 'Economy'  },
  { url: 'https://feeds.bloomberg.com/markets/news.rss',                    src: 'BBG',  topic: 'Markets'  },
  { url: 'https://feeds.bloomberg.com/politics/news.rss',                   src: 'BBG',  topic: 'Politics' },
  { url: 'https://feeds.bloomberg.com/technology/news.rss',                 src: 'BBG',  topic: 'Tech'     },
  { url: 'https://feeds.content.dowjones.io/public/rss/socialeconomyfeed',  src: 'WSJ',  topic: 'Economy'  },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSMarketsMain',     src: 'WSJ',  topic: 'Markets'  },
  { url: 'https://feeds.content.dowjones.io/public/rss/socialpoliticsfeed', src: 'WSJ',  topic: 'Politics' },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSWorldNews',       src: 'WSJ',  topic: 'World'    },
  { url: 'https://feeds.content.dowjones.io/public/rss/RSSUSnews',          src: 'WSJ',  topic: 'US'       },
  { url: 'https://feeds.content.dowjones.io/public/rss/WSJcomUSBusiness',   src: 'WSJ',  topic: 'Business' },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',          src: 'NYT',  topic: 'World'    },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/US.xml',             src: 'NYT',  topic: 'US'       },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml',       src: 'NYT',  topic: 'Politics' },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml',       src: 'NYT',  topic: 'Business' },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Economy.xml',        src: 'NYT',  topic: 'Economy'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Dealbook.xml',       src: 'NYT',  topic: 'Markets'  },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml',     src: 'NYT',  topic: 'Tech'     },
  { url: 'https://www.scmp.com/rss/91/feed/',                                src: 'SCMP', topic: 'World'    },
  { url: 'https://www.scmp.com/rss/318198/feed/',                            src: 'SCMP', topic: 'Politics' },
  { url: 'https://www.scmp.com/rss/318421/feed/',                            src: 'SCMP', topic: 'Economy'  },
  { url: 'https://www.scmp.com/rss/92/feed/',                                src: 'SCMP', topic: 'Business' },
  { url: 'https://www.scmp.com/rss/36/feed/',                                src: 'SCMP', topic: 'Tech'     },
  { url: 'https://www.scmp.com/rss/4/feed',                                  src: 'SCMP', topic: 'China'    },
];

let allItems       = [];
let activeSources  = new Set(['BBG','WSJ','NYT','SCMP']);
let activeTopics   = new Set(['Economy','Markets','Politics','Tech','Business','World','China','US']);
let activeKeywords = [];

const isMobile = () => window.innerWidth <= 680;

// ── DRAWER ─────────────────────────────────────────────

function buildDrawerChips() {
  const srcWrap   = document.getElementById('drawer-src-chips');
  const topicWrap = document.getElementById('drawer-topic-chips');

  srcWrap.innerHTML = ['BBG','WSJ','NYT','SCMP'].map(s =>
    `<button class="drawer-chip ${activeSources.has(s)?'active':''}" data-src="${s}" onclick="toggleDrawerChip(this,'src')">${s}</button>`
  ).join('');

  topicWrap.innerHTML = ['Economy','Markets','Politics','Tech','Business','World','China','US'].map(t =>
    `<button class="drawer-chip ${activeTopics.has(t)?'active':''}" data-topic="${t}" onclick="toggleDrawerChip(this,'topic')">${t}</button>`
  ).join('');
}

function toggleDrawerChip(btn, type) {
  if (type === 'src') {
    const val = btn.dataset.src;
    if (activeSources.has(val)) { activeSources.delete(val); btn.classList.remove('active'); }
    else { activeSources.add(val); btn.classList.add('active'); }
  } else {
    const val = btn.dataset.topic;
    if (activeTopics.has(val)) { activeTopics.delete(val); btn.classList.remove('active'); }
    else { activeTopics.add(val); btn.classList.add('active'); }
  }
  syncDesktopFilters();
  updateFabCount();
  render();
}

function syncDesktopFilters() {
  document.querySelectorAll('#sidebar .filter-btn[data-src]').forEach(btn => {
    btn.classList.toggle('active', activeSources.has(btn.dataset.src));
  });
  document.querySelectorAll('#sidebar .filter-btn[data-topic]').forEach(btn => {
    btn.classList.toggle('active', activeTopics.has(btn.dataset.topic));
  });
}

function updateFabCount() {
  const totalFilters = 4 + 8; // all sources + all topics
  const activeCount  = activeSources.size + activeTopics.size + activeKeywords.length;
  const inactive     = totalFilters - activeSources.size - activeTopics.size;
  const el = document.getElementById('fab-count');
  if (inactive > 0 || activeKeywords.length > 0) {
    el.style.display = 'flex';
    el.textContent = activeKeywords.length > 0 ? activeKeywords.length + inactive : inactive;
  } else {
    el.style.display = 'none';
  }
}

function openDrawer() {
  buildDrawerChips();
  renderDrawerKeywords();
  const overlay = document.getElementById('drawer-overlay');
  const drawer  = document.getElementById('drawer');
  overlay.style.display = 'block';
  drawer.style.display  = 'block';
  requestAnimationFrame(() => {
    overlay.classList.add('open');
    drawer.classList.add('open');
  });
}

function closeDrawer() {
  const overlay = document.getElementById('drawer-overlay');
  const drawer  = document.getElementById('drawer');
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  setTimeout(() => {
    overlay.style.display = 'none';
    drawer.style.display  = 'none';
  }, 300);
}

// Drawer keyword support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('drawer-keyword-input')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = this.value.trim().toLowerCase().replace(/,/g, '');
      if (val && !activeKeywords.includes(val)) {
        activeKeywords.push(val);
        renderDrawerKeywords();
        renderKeywordTags();
        updateFabCount();
        render();
      }
      this.value = '';
    } else if (e.key === 'Backspace' && this.value === '' && activeKeywords.length > 0) {
      activeKeywords.pop();
      renderDrawerKeywords();
      renderKeywordTags();
      updateFabCount();
      render();
    }
  });
});

function renderDrawerKeywords() {
  const wrap = document.getElementById('drawer-keyword-tags');
  if (!wrap) return;
  wrap.innerHTML = activeKeywords.map((kw, i) =>
    `<span class="drawer-keyword-tag">${escHtml(kw)}<button onclick="removeKeywordFromDrawer(${i})">×</button></span>`
  ).join('');
}

function removeKeywordFromDrawer(i) {
  activeKeywords.splice(i, 1);
  renderDrawerKeywords();
  renderKeywordTags();
  updateFabCount();
  render();
}

// ── FETCH ──────────────────────────────────────────────

async function fetchFeed(feed, proxyIdx = 0) {
  if (proxyIdx >= CORS_PROXIES.length) return [];
  const proxyUrl = CORS_PROXIES[proxyIdx](feed.url);
  try {
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    return parseRSS(text, feed);
  } catch {
    return fetchFeed(feed, proxyIdx + 1);
  }
}

function parseRSS(xml, feed) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item'));
  return items.map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
    const desc    = item.querySelector('description')?.textContent?.trim() || '';
    const date    = pubDate ? new Date(pubDate) : new Date(0);
    const div     = document.createElement('div');
    div.innerHTML = desc;
    const cleanDesc = div.textContent.trim().slice(0, 280);
    return { title, link, date, desc: cleanDesc, src: feed.src, topic: feed.topic };
  }).filter(i => i.title && i.date.getFullYear() > 2000 && (Date.now() - i.date) < 86400000);
}

// ── LOAD ALL ───────────────────────────────────────────

async function loadAll() {
  setStatus('loading', 'FETCHING');
  setProgress(0);

  const results = [];
  let done = 0;

  await Promise.allSettled(FEEDS.map(async feed => {
    const items = await fetchFeed(feed);
    results.push(...items);
    done++;
    setProgress(Math.round((done / FEEDS.length) * 100));
  }));

  const seen = new Set();
  allItems = results.filter(i => {
    const key = i.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  allItems.sort((a, b) => b.date - a.date);

  setStatus('live', `LIVE · ${allItems.length}`);
  setProgress(100);
  setTimeout(() => setProgress(0), 600);

  document.getElementById('last-updated').textContent =
    `updated ${new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false})}`;

  if (window.logPull) window.logPull(results.length);

  if (window._analyticsTransaction) {
    window._analyticsTransaction(window._analyticsRef(window._analyticsDb, "visits/newsfeed"), n => (n || 0) + 1);
    window._analyticsTransaction(window._analyticsRef(window._analyticsDb, "visits/total"),    n => (n || 0) + 1);
  }

  render();
  renderSparkline();
}

// ── RENDER ─────────────────────────────────────────────

function getFiltered() {
  return allItems.filter(i => {
    if (!activeSources.has(i.src) || !activeTopics.has(i.topic)) return false;
    if (activeKeywords.length === 0) return true;
    const haystack = (i.title + ' ' + i.desc).toLowerCase();
    return activeKeywords.every(kw => haystack.includes(kw));
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = `${filtered.length} stories`;

  // Desktop table
  renderTable(filtered);
  // Mobile cards
  renderCards(filtered);
}

function renderTable(filtered) {
  const body = document.getElementById('feed-body');
  if (filtered.length === 0) {
    const msg = (activeSources.size === 0 || activeTopics.size === 0)
      ? 'NO FEEDS ACTIVE — SELECT SOURCES AND TOPICS TO BEGIN'
      : 'NO RESULTS';
    body.innerHTML = `<tr id="empty-row"><td colspan="4">${msg}</td></tr>`;
    return;
  }
  body.innerHTML = filtered.map(item => {
    const { ageClass } = formatAge(item.date);
    const timeStr = item.date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const escapedDesc  = escHtml(item.desc || '—');
    const escapedTitle = escHtml(item.title);
    return `<tr class="feed-row">
      <td class="cell-time"><span class="${ageClass}">${timeStr}</span></td>
      <td class="cell-source"><span class="source-badge src-${item.src}">${item.src}</span></td>
      <td class="cell-tag"><span class="topic-badge topic-${item.topic}">${item.topic}</span></td>
      <td class="cell-headline">
        <a class="headline-link" href="${item.link}" target="_blank" rel="noopener"
           data-desc="${escapedDesc}"
           onmouseenter="showTip(event,this)"
           onmousemove="moveTip(event)"
           onmouseleave="hideTip()"
        >${escapedTitle}</a>
      </td>
    </tr>`;
  }).join('');
}

function renderCards(filtered) {
  const wrap = document.getElementById('card-feed');
  if (filtered.length === 0) {
    const msg = (activeSources.size === 0 || activeTopics.size === 0)
      ? 'NO FEEDS ACTIVE — TAP ⚙ TO SELECT SOURCES' : 'NO RESULTS';
    wrap.innerHTML = `<div id="card-empty">${msg}</div>`;
    return;
  }
  wrap.innerHTML = filtered.map(item => {
    const { ageClass } = formatAge(item.date);
    const timeStr = item.date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const desc = item.desc && item.desc !== '—' ? `<div class="card-desc">${escHtml(item.desc)}</div>` : '';
    return `<a class="feed-card" href="${item.link}" target="_blank" rel="noopener">
      <div class="card-meta">
        <span class="source-badge src-${item.src}">${item.src}</span>
        <span class="topic-badge topic-${item.topic}">${item.topic}</span>
        <span class="card-time ${ageClass}">${timeStr}</span>
      </div>
      <div class="card-headline">${escHtml(item.title)}</div>
      ${desc}
    </a>`;
  }).join('');
}

// ── TOOLTIP (desktop only) ─────────────────────────────

const tip = document.getElementById('tooltip');

function showTip(e, el) {
  if (isMobile()) return;
  const desc = el.getAttribute('data-desc');
  if (!desc || desc === '—') return;
  tip.textContent = desc;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const pad = 14, tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ── FILTERS (desktop) ──────────────────────────────────

function toggleFilter(btn, type) {
  if (type === 'src') {
    const val = btn.dataset.src;
    if (activeSources.has(val)) { activeSources.delete(val); btn.classList.remove('active'); }
    else { activeSources.add(val); btn.classList.add('active'); }
  } else {
    const val = btn.dataset.topic;
    if (activeTopics.has(val)) { activeTopics.delete(val); btn.classList.remove('active'); }
    else { activeTopics.add(val); btn.classList.add('active'); }
  }
  updateFabCount();
  render();
}

// ── KEYWORDS (desktop) ────────────────────────────────

document.getElementById('keyword-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = this.value.trim().toLowerCase().replace(/,/g, '');
    if (val && !activeKeywords.includes(val)) {
      activeKeywords.push(val);
      renderKeywordTags();
      updateFabCount();
      render();
    }
    this.value = '';
  } else if (e.key === 'Backspace' && this.value === '' && activeKeywords.length > 0) {
    activeKeywords.pop();
    renderKeywordTags();
    updateFabCount();
    render();
  }
});

function renderKeywordTags() {
  document.getElementById('keyword-tags').innerHTML = activeKeywords.map((kw, i) =>
    `<span class="keyword-tag">${escHtml(kw)}<button class="keyword-tag-remove" onclick="removeKeyword(${i})">×</button></span>`
  ).join('');
}

function removeKeyword(i) {
  activeKeywords.splice(i, 1);
  renderKeywordTags();
  updateFabCount();
  render();
}

// ── SPARKLINE ──────────────────────────────────────────

function renderSparkline() {
  const wrap = document.getElementById('sparkline');
  if (!wrap || wrap.offsetWidth === 0) return;

  const BAR_W = 2, GAP = 1, UNIT = BAR_W + GAP;
  const availW = wrap.offsetWidth;
  const BUCKETS = Math.max(24, Math.floor(availW / UNIT));
  const bucketMs = 86400000 / BUCKETS;
  const now = Date.now();
  const counts = new Array(BUCKETS).fill(0);

  allItems.forEach(item => {
    const ageMs = now - item.date;
    if (ageMs < 0 || ageMs >= 86400000) return;
    const bucket = Math.floor(ageMs / bucketMs);
    counts[BUCKETS - 1 - bucket]++;
  });

  const max = Math.max(...counts, 1);

  function bucketColor(i, count) {
    const t = i / (BUCKETS - 1);
    const intensity = count / max;
    if (intensity < 0.05) return '#1a1a1a';
    let r, g, b;
    if (t < 0.5) {
      const s = t * 2;
      r = Math.round(60  + s * (30  - 60));
      g = Math.round(30  + s * (180 - 30));
      b = Math.round(120 + s * (140 - 120));
    } else {
      const s = (t - 0.5) * 2;
      r = Math.round(30  + s * (251 - 30));
      g = Math.round(180 + s * (191 - 180));
      b = Math.round(140 + s * (36  - 140));
    }
    r = Math.round(r * (0.3 + intensity * 0.7));
    g = Math.round(g * (0.3 + intensity * 0.7));
    b = Math.round(b * (0.3 + intensity * 0.7));
    return `rgb(${r},${g},${b})`;
  }

  wrap.innerHTML = counts.map((c, i) => {
    const pct = Math.max(Math.round((c / max) * 100), c > 0 ? 5 : 2);
    const color = bucketColor(i, c);
    return `<div class="spark-bar" style="height:${pct}%;width:${BAR_W}px;background:${color}"></div>`;
  }).join('');
}

// ── HELPERS ────────────────────────────────────────────

function setStatus(state, text) {
  document.getElementById('status-dot').className = state;
  document.getElementById('status-text').textContent = text;
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

function formatAge(date) {
  const mins = Math.floor((Date.now() - date) / 60000);
  if (mins < 30)  return { ageClass: 'age-fresh' };
  if (mins < 180) return { ageClass: 'age-recent' };
  return { ageClass: 'age-old' };
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── INIT ───────────────────────────────────────────────

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
